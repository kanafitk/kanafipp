{% extends "front/share/base.html" %}

{% block title %}Forgot Password - LuxeShop{% endblock %}

{% block content %}
<div class="container section flex" style="justify-content: center;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 2.5rem;">
        <div class="text-center mb-6">
            <h1 style="font-size: 2rem;">Reset Password</h1>
            <p>Enter your email and we'll send you a link to reset your password.</p>
        </div>
        
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary mt-4" style="width: 100%; justify-content: center; padding: 0.875rem; font-size: 1.125rem;">Send Reset Link</button>
        </form>
        
        <div class="text-center mt-6">
            <p style="font-size: 0.875rem;">Remember your password? <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 600;">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
