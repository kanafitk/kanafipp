{% extends "front/share/base.html" %}

{% block title %}Choose New Password - LuxeShop{% endblock %}

{% block content %}
<div class="container section flex" style="justify-content: center;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 2.5rem;">
        <div class="text-center mb-6">
            <h1 style="font-size: 2rem;">New Password</h1>
            <p>Enter a new password for your account.</p>
        </div>
        
        <form action="{{ url_for('reset_password', token=token) }}" method="POST">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" required minlength="6">
            </div>
            
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary mt-4" style="width: 100%; justify-content: center; padding: 0.875rem; font-size: 1.125rem;">Reset Password</button>
        </form>
        
        <div class="text-center mt-6">
            <p style="font-size: 0.875rem;">Back to <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 600;">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
