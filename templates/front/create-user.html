{% extends "front/share/base.html" %}

{% block title %}Create Account - LuxeShop{% endblock %}

{% block content %}
<div class="container section flex" style="justify-content: center;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 2.5rem;">
        <div class="text-center mb-6">
            <h1 style="font-size: 2rem;">Create an Account</h1>
            <p>Join LuxeShop today</p>
        </div>
        
        <form action="{{ url_for('create_user') }}" method="POST">
            <div class="grid grid-cols-2" style="gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary mt-4" style="width: 100%; justify-content: center; padding: 0.875rem; font-size: 1.125rem;">Sign Up</button>
        </form>
        
        <div class="text-center mt-6">
            <p style="font-size: 0.875rem;">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 600;">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
