<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Commerce App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    {% include 'front/share/navbar.html' %}
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="container" style="margin-top: 1rem; margin-bottom: -3rem; position: relative; z-index: 10;">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }}" style="padding: 1rem; border-radius: var(--border-radius); margin-bottom: 1rem; font-weight: 500; display: flex; justify-content: space-between; align-items: center; background-color: {% if category == 'success' %}#dcfce7{% else %}#fee2e2{% endif %}; color: {% if category == 'success' %}#15803d{% else %}#b91c1c{% endif %}; border: 1px solid {% if category == 'success' %}#bbf7d0{% else %}#fecaca{% endif %}; animation: slideDown 0.3s ease-out;">
                        <span>{{ message }}</span>
                        <button onclick="this.parentElement.remove()" style="background: none; border: none; font-size: 1.25rem; cursor: pointer; color: inherit; line-height: 1; outline: none;">&times;</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    
    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'front/share/footer.html' %}
</body>
</html>
